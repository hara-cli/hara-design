# Test every supported Node.js line on changes and publish @nanhara/hara-design only after
# the complete quality matrix passes. Manual runs retain the idempotent publish path.
name: publish-npm

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          plugin_version=$(node -p "require('./plugin.json').version")
          if [[ "$package_version" != "$plugin_version" ]]; then
            echo "package.json ($package_version) and plugin.json ($plugin_version) differ"
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "tag ($tag_version) and package version ($package_version) differ"
              exit 1
            fi
          fi
      - name: Test
        run: npm test
      - name: Inspect package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/
      - name: Publish to npm (idempotent)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          out=$(npm publish --registry https://registry.npmjs.org/ 2>&1); code=$?
          echo "$out"
          if [ $code -eq 0 ]; then echo "✓ published"; exit 0; fi
          if echo "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT|409 Conflict"; then
            echo "✓ auth OK — this version is already on npm; nothing to publish"; exit 0
          fi
          echo "✗ publish failed (auth or other error above)"; exit 1
